<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro APP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="div-header">
            <h1>Pomodoro APP</h1>
            <p>Bem-vindo ao Pomodoro APP! Este aplicativo é projetado para ajudar</p>
        </div>
    </header>
    <main>
        <section id="monitor">
            <div class="div-main">
                <h1>Cronometro</h1>
                <span id="cronometro">25:00</span>
                <div class="div-buttons">
                    <button id="buttom-start">Iniciar</button>
                    <button id="buttom-reset" >Reiniciar</button>
                    <button id="buttom-pause" >Pausar</button>
                </div>
            </div>
        </section>
    </main>
<script src="script.js"></script>
</body>
</html>
